<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Enterprise DNS Guard</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.0.1/socket.io.js"></script>
    <style>
        body { background-color: #f4f6f9; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        
        /* Live Monitor Styles */
        .log-container { height: 70vh; overflow-y: scroll; background: white; border-radius: 8px; padding: 10px; border: 1px solid #ddd; }
        .log-entry { padding: 8px; border-bottom: 1px solid #eee; animation: fadeIn 0.5s; font-size: 0.9rem; }
        
        /* Status Colors */
        .log-alert { background-color: #ffebee; color: #c62828; border-left: 5px solid #c62828; font-weight: bold; }
        .log-ok { color: #2e7d32; border-left: 5px solid #2e7d32; }
        .log-warning { color: #f9a825; border-left: 5px solid #f9a825; }
        
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        
        /* History Table Styles */
        .table-container { height: 70vh; overflow-y: scroll; background: white; border-radius: 8px; padding: 10px; }
        .status-badge { font-size: 0.8em; padding: 5px 10px; border-radius: 12px; color: white; }
        .bg-alert { background-color: #c62828; }
        .bg-ok { background-color: #2e7d32; }
        .bg-warning { background-color: #f9a825; }

        /* Connection Indicator */
        .connection-status {
            width: 15px;
            height: 15px;
            display: inline-block;
            border-radius: 50%;
            margin-right: 5px;
        }
        .status-connected { background-color: #2e7d32; box-shadow: 0 0 5px #2e7d32; }
        .status-disconnected { background-color: #c62828; box-shadow: 0 0 5px #c62828; }
    </style>
</head>
<body>
    <div class="container mt-4">
        <h2 class="text-center mb-4">🛡️ DNS Spoofing Detection System</h2>
        
        <ul class="nav nav-tabs" id="myTab" role="tablist">
            <li class="nav-item" role="presentation">
                <button class="nav-link active" id="live-tab" data-bs-toggle="tab" data-bs-target="#live" type="button" role="tab">📡 Live Monitor</button>
            </li>
            <li class="nav-item" role="presentation">
                <button class="nav-link" id="history-tab" data-bs-toggle="tab" data-bs-target="#history" type="button" role="tab" onclick="loadHistory()">📜 Attack History</button>
            </li>
        </ul>

        <div class="tab-content mt-3" id="myTabContent">
            
            <div class="tab-pane fade show active" id="live" role="tabpanel">
                <div class="card shadow-sm">
                    <div class="card-header bg-dark text-white d-flex justify-content-between align-items-center">
                        <span>Real-Time Traffic</span>
                        <div>
                            <span id="conn-dot" class="connection-status status-disconnected"></span>
                            <span id="conn-text" class="small">Disconnected</span>
                        </div>
                    </div>
                    <div class="card-body log-container" id="log-box">
                        <div class="text-muted text-center mt-5" id="waiting-msg">Waiting for traffic...</div>
                    </div>
                </div>
            </div>

            <div class="tab-pane fade" id="history" role="tabpanel">
                <div class="card shadow-sm">
                    <div class="card-header bg-secondary text-white">
                        <span>Database Records (Last 200)</span>
                        <button class="btn btn-sm btn-light float-end" onclick="loadHistory()">Refresh</button>
                    </div>
                    <div class="card-body table-container">
                        <table class="table table-striped table-hover">
                            <thead>
                                <tr>
                                    <th>Time</th>
                                    <th>Domain</th>
                                    <th>Detected IP</th>
                                    <th>Status</th>
                                    <th>Details</th>
                                </tr>
                            </thead>
                            <tbody id="history-table-body">
                                </tbody>
                        </table>
                    </div>
                </div>
            </div>

        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

    <script>
        const socket = io();
        const logBox = document.getElementById('log-box');
        const historyTableBody = document.getElementById('history-table-body');
        const connDot = document.getElementById('conn-dot');
        const connText = document.getElementById('conn-text');
        const waitingMsg = document.getElementById('waiting-msg');

        // --- WebSocket Connection Handling ---
        socket.on('connect', () => {
            console.log("Connected to WebSocket");
            connDot.className = 'connection-status status-connected';
            connText.textContent = "Live";
        });

        socket.on('disconnect', () => {
            console.log("Disconnected from WebSocket");
            connDot.className = 'connection-status status-disconnected';
            connText.textContent = "Disconnected (Reconnecting...)";
        });

        socket.on('new_log', (data) => {
            if(waitingMsg) waitingMsg.style.display = 'none';

            const div = document.createElement('div');
            let cssClass = 'log-entry';
            
            if (data.status === 'alert') cssClass += ' log-alert';
            else if (data.status === 'ok') cssClass += ' log-ok';
            else cssClass += ' log-warning';

            div.className = cssClass;
            div.innerHTML = `
                <span class="text-muted">[${data.timestamp}]</span> 
                <strong>${data.domain}</strong> &rarr; ${data.ip} 
                <span class="float-end">${data.message}</span>
            `;

            logBox.prepend(div);
        });

        // --- History API ---
        async function loadHistory() {
            try {
                const response = await fetch('/api/history');
                if (!response.ok) throw new Error("Failed to load history");
                
                const logs = await response.json();
                
                historyTableBody.innerHTML = ''; // Clear table
                
                if (logs.length === 0) {
                    historyTableBody.innerHTML = '<tr><td colspan="5" class="text-center">No records found</td></tr>';
                    return;
                }

                logs.forEach(log => {
                    let badgeClass = 'bg-secondary';
                    if (log.status === 'alert') badgeClass = 'bg-alert';
                    else if (log.status === 'ok') badgeClass = 'bg-ok';
                    else if (log.status === 'warning') badgeClass = 'bg-warning';

                    const row = `
                        <tr>
                            <td>${log.timestamp}</td>
                            <td>${log.domain}</td>
                            <td>${log.ip}</td>
                            <td><span class="status-badge ${badgeClass}">${log.status.toUpperCase()}</span></td>
                            <td class="text-muted small">${log.message}</td>
                        </tr>
                    `;
                    historyTableBody.innerHTML += row;
                });
            } catch (error) {
                console.error("Error fetching history:", error);
                historyTableBody.innerHTML = `<tr><td colspan="5" class="text-center text-danger">Error loading history: ${error.message}</td></tr>`;
            }
        }
    </script>
</body>
</html>
